<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Golf Journey Roulette</title>
<style>
:root{--bg:#0b1220;--panel:rgba(17,24,39,.92);--line:rgba(255,255,255,.12);--text:#eef2ff;--muted:#a5b4cc;--gold:#d4af37;--gold2:#f6e27a}
*{box-sizing:border-box}
body{margin:0;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;background:radial-gradient(circle at top, rgba(212,175,55,.10), transparent 30%),linear-gradient(180deg,#08101d 0%,#0b1220 48%,#111827 100%);min-height:100vh}
.wrap{max-width:1180px;margin:0 auto;padding:18px}
h1{margin:0;font-size:clamp(28px,4vw,40px);font-weight:900;background:linear-gradient(90deg,#fff,var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:var(--muted);line-height:1.6;margin-top:8px;margin-bottom:18px}
.grid{display:grid;grid-template-columns:350px 1fr;gap:18px}
.panel,.card,.hero{background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:18px;backdrop-filter:blur(10px)}
.hero{max-width:860px;margin:48px auto;padding:28px}
.heroGrid{display:grid;grid-template-columns:1.15fr .85fr;gap:20px;align-items:center}
.heroActions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}
.langBtn{border:none;border-radius:18px;padding:18px 16px;font:inherit;font-weight:900;cursor:pointer}
.langBtn.primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#241700}
.langBtn.secondary{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--line)}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px}
.langSwitch{display:flex;gap:8px;flex-wrap:wrap}
.miniBtn{padding:8px 12px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--text);cursor:pointer}
.miniBtn.active{background:rgba(212,175,55,.16);border-color:rgba(212,175,55,.45)}
.ttl{display:block;color:var(--gold2);font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin:0 0 8px}
select,button{font:inherit}
select{width:100%;padding:12px 14px;border-radius:14px;background:#111827;color:var(--text);border:1px solid var(--line)}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 16px}
.chip{padding:9px 12px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid var(--line);cursor:pointer;user-select:none}
.chip.active{background:rgba(212,175,55,.16);border-color:rgba(212,175,55,.45)}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{border:none;border-radius:16px;padding:14px 16px;font-weight:900;cursor:pointer}
.primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#241700}
.secondary{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--line)}
.roulette{position:relative;overflow:hidden;height:230px;border-radius:22px;border:1px solid var(--line);background:rgba(255,255,255,.03)}
.ticker{position:absolute;left:0;right:0;top:0;will-change:transform}
.item{height:72px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:clamp(24px,3vw,34px);border-bottom:1px solid rgba(255,255,255,.04)}
.item:nth-child(odd){background:rgba(255,255,255,.02)}
.pointer{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:72px;border-top:2px solid rgba(212,175,55,.86);border-bottom:2px solid rgba(212,175,55,.86);background:linear-gradient(90deg,transparent,rgba(212,175,55,.08),transparent)}
.meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.pill{padding:8px 12px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.06);font-size:13px}
.status{margin-top:14px;padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);line-height:1.5}
.ok{background:rgba(34,197,94,.10);border-color:rgba(34,197,94,.28)} .warn{background:rgba(96,165,250,.08);border-color:rgba(96,165,250,.25)} .err{background:rgba(248,113,113,.10);border-color:rgba(248,113,113,.28)}
.result{display:grid;grid-template-columns:1.08fr .92fr;gap:18px}
.pref{font-size:42px;font-weight:900} .course{font-size:26px;font-weight:900;line-height:1.35}
.desc,.subline{color:var(--muted);line-height:1.55}
.list{max-height:560px;overflow:auto} .row{padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06)} .row:last-child{border-bottom:none}
.links a{display:inline-block;margin:8px 8px 0 0;padding:10px 12px;border-radius:12px;text-decoration:none;color:var(--text);border:1px solid var(--line);background:rgba(255,255,255,.08)}
.links a.primaryLink{background:linear-gradient(135deg,#1f6feb,#60a5fa);border:none}
.small{font-size:12px;color:var(--muted)}
.hidden{display:none}
@media(max-width:900px){.grid,.result,.heroGrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="languageGate" class="wrap">
  <div class="hero">
    <div class="heroGrid">
      <div>
        <div class="ttl" id="gateEyebrow">WELCOME</div>
        <h1 id="gateTitle">Golf Journey Roulette</h1>
        <div class="sub" id="gateSub">Choose your language first. Then spin the roulette to pick a prefecture and get real golf course candidates from Rakuten GORA.</div>
      </div>
      <div>
        <div class="heroActions">
          <button id="chooseJa" class="langBtn primary">日本語で始める</button>
          <button id="chooseEn" class="langBtn secondary">Start in English</button>
        </div>
        <div class="small" id="gateNote" style="margin-top:12px">You can switch between Japanese and English anytime after entering.</div>
      </div>
    </div>
  </div>
</div>

<div id="app" class="wrap hidden">
  <div class="topbar">
    <div>
      <h1 id="appTitle">Golf Journey Roulette</h1>
      <div class="sub" id="appSub">県ルーレットを先に回して、その県の楽天GORA候補を取得します。</div>
    </div>
    <div class="langSwitch">
      <button id="langJa" class="miniBtn">日本語</button>
      <button id="langEn" class="miniBtn">English</button>
    </div>
  </div>

  <div class="grid">
    <div class="panel">
      <label class="ttl" id="seasonTtl">Season</label>
      <select id="season"></select>

      <label class="ttl" id="areaTtl" style="margin-top:16px">Area</label>
      <select id="area"></select>

      <label class="ttl" id="brandTtl" style="margin-top:16px">Brand</label>
      <div id="brandChips" class="chips"></div>

      <div class="actions">
        <button id="spinBtn" class="btn primary">ルーレット開始</button>
        <button id="rerollBtn" class="btn secondary">同じ県で再抽選</button>
      </div>

      <div id="statusBox" class="status warn"></div>
    </div>

    <div>
      <div class="card">
        <div class="roulette"><div class="pointer"></div><div id="ticker" class="ticker"></div></div>
        <div class="meta">
          <span id="seasonLabel" class="pill"></span>
          <span id="areaLabel" class="pill"></span>
          <span id="statusLabel" class="pill"></span>
        </div>
      </div>

      <div class="result" style="margin-top:18px">
        <div class="card">
          <div id="winPref" class="pref">-</div>
          <div id="winCourse" class="course"></div>
          <div id="winDesc" class="desc"></div>
          <div id="winMeta" class="meta"></div>
          <div id="winLinks" class="links"></div>
        </div>
        <div class="card">
          <h3 id="candidateTitle" style="margin-top:0"></h3>
          <div id="candidateList" class="list"></div>
        </div>
      </div>
    </div>
  </div>
</div>

function displayBrand(brand) { return BRAND_LABELS[currentLang][brand] || brand; }

function esc(s) { return String(s || '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;'); }
function normalize(s) { return (s || '').replace(/[Ａ-Ｚａ-ｚ０-９]/g, ch => String.fromCharCode(ch.charCodeAt(0)-0xFEE0)).replace(/[　]/g,' ').replace(/\s+/g,' ').trim().toLowerCase(); }
function seasonKey() {
  const v = document.getElementById('season').value;
  if (v !== 'auto') return v;
  const m = new Date().getMonth() + 1;
  if ([3,4,5].includes(m)) return 'spring';
  if ([6,7,8].includes(m)) return 'summer';
  if ([9,10,11].includes(m)) return 'autumn';
  return 'winter';
}
function seasonLabel(v) { return SEASON_NAMES[currentLang][v] || v; }

function inferBrand(name) {
  const n = normalize(name);
  if (n.includes('アコーディア') || n.includes('accordia')) return 'アコーディア';
  if (n.includes('grand pgm') || n.includes('グランドpgm')) return 'GRAND PGM';
  if (n.includes('pgm') || n.includes('チサン') || n.includes('パシフィックゴルフ')) return 'PGM';
  if (GRAND_PGM_NAMES.some(x => n.includes(normalize(x)))) return 'GRAND PGM';
  if (PGM_NAMES.some(x => n.includes(normalize(x)))) return 'PGM';
  if (ACCORDIA_NAMES.some(x => n.includes(normalize(x)))) return 'アコーディア';
  return 'その他';
}
function comfort(pref, brand, evaluation) {
  const s = seasonKey();
  const t = REGION_SCORE[pref] || {cool:0,warm:0,snow:0};
  let score = 70 + (brand === 'GRAND PGM' ? 8 : brand === 'PGM' ? 5 : brand === 'アコーディア' ? 3 : 0);
  score += Math.max(0, ((evaluation || 3.8) - 3.8) * 12);
  if (s === 'summer') score += t.cool * 1.8 - t.warm * 0.2 - t.snow * 0.1;
  if (s === 'winter') score += t.warm * 1.9 - t.snow * 2.2;
  return Math.max(50, Math.min(99, Math.round(score)));
}
function setStatus(kind, html) { statusBox.className = 'status ' + kind; statusBox.innerHTML = html; }

function populateSeasonOptions() {
  const season = document.getElementById('season');
  const current = season.value || 'auto';
  season.innerHTML = '';
  ['auto','spring','summer','autumn','winter'].forEach(v => {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = SEASON_NAMES[currentLang][v];
    if (v === current) opt.selected = true;
    season.appendChild(opt);
  });
}

function populateAreaOptions() {
  const area = document.getElementById('area');
  const current = area.value || 'all';
  area.innerHTML = '';
  ['all','hokkaido','tohoku','kanto','chubu','kinki','chugoku','shikoku','kyushu','okinawa'].forEach(v => {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = AREA_LABELS[currentLang][v];
    if (v === current) opt.selected = true;
    area.appendChild(opt);
  });
}

function renderBrandChips() {
  brandChips.innerHTML = '';
  BRANDS.forEach((b) => {
    const d = document.createElement('div');
    d.className = 'chip' + (activeBrands.has(b) ? ' active' : '');
    d.textContent = displayBrand(b);
    d.onclick = () => {
      if (activeBrands.has(b)) activeBrands.delete(b); else activeBrands.add(b);
      if (activeBrands.size === 0) activeBrands.add(b);
      renderBrandChips();
      cache.clear();
    };
    brandChips.appendChild(d);
  });
}

async function fetchCourses(pref) {
  const code = PREF_CODES[pref];
  const key = pref + '::' + code + '::' + [...activeBrands].sort().join(',') + '::' + seasonKey();
  if (cache.has(key)) return cache.get(key);
  const res = await fetch('/api/search?prefCode=' + encodeURIComponent(code) + '&pref=' + encodeURIComponent(pref));
  if (!res.ok) throw new Error(await res.text() || 'API error');
  const data = await res.json();
  const rawItems = data.items || data.Items || [];
  let list = rawItems.map(item => {
    const brand = inferBrand(item.golfCourseName || '');
    return {
      pref,
      golfCourseId: item.golfCourseId,
      name: item.golfCourseName || '',
      evaluation: Number(item.evaluation || 0),
      address: item.address || '',
      detailUrl: item.golfCourseDetailUrl || '',
      reserveUrl: item.reserveCalUrl || item.golfCourseDetailUrl || '',
      brand,
      comfort: comfort(pref, brand, Number(item.evaluation || 0))
    };
  });
  list = list.filter(c => activeBrands.has(c.brand) || (activeBrands.has('その他') && c.brand === 'その他'));
  list = list.filter(c => c.brand !== 'その他' || c.evaluation >= 3.8);
  if (!list.length && rawItems.length) {
    list = rawItems.map(item => ({
      pref,
      golfCourseId: item.golfCourseId,
      name: item.golfCourseName || '',
      evaluation: Number(item.evaluation || 0),
      address: item.address || '',
      detailUrl: item.golfCourseDetailUrl || '',
      reserveUrl: item.reserveCalUrl || item.golfCourseDetailUrl || '',
      brand: 'その他',
      comfort: comfort(pref, 'その他', Number(item.evaluation || 0))
    })).filter(c => c.evaluation >= 3.8);
  }
  list.sort((a, b) => b.comfort - a.comfort || b.evaluation - a.evaluation);
  cache.set(key, list);
  return list;
}

function currentAreaPrefs() { return AREAS[document.getElementById('area').value]; }
function pickWeightedPref(prefs) {
  const s = seasonKey();
  const scored = prefs.map(pref => {
    const t = REGION_SCORE[pref] || {cool:0,warm:0,snow:0};
    let w = 1;
    if (s === 'summer') w += Math.max(0, t.cool * 0.25);
    if (s === 'winter') w += Math.max(0, t.warm * 0.25) + Math.max(0, (3 - t.snow) * 0.1);
    if (s === 'spring' || s === 'autumn') w += 0.3;
    return { pref, weight: Math.max(0.4, w) };
  });
  const total = scored.reduce((a, b) => a + b.weight, 0);
  let r = Math.random() * total;
  for (const item of scored) { r -= item.weight; if (r <= 0) return item.pref; }
  return scored[scored.length - 1].pref;
}
async function fetchFirstValidPref(prefs) {
  const tried = new Set(); const order = [];
  while (order.length < prefs.length) {
    const p = pickWeightedPref(prefs.filter(x => !tried.has(x)));
    tried.add(p); order.push(p);
  }
  for (const pref of order) {
    try { const list = await fetchCourses(pref); if (list.length) return { pref, list }; } catch (e) {}
  }
  return { pref: null, list: [] };
}

const ITEM_H = 72, BOX_H = 230;
function renderTicker(items) {
  ticker.innerHTML = '';
  items.forEach(name => {
    const d = document.createElement('div');
    d.className = 'item';
    d.textContent = displayPref(name);
    ticker.appendChild(d);
  });
}
function makeTickerItems(prefs, winner) {
  const rep = []; for (let i = 0; i < 6; i++) rep.push(...prefs); rep.push(winner); return [...rep, ...prefs.slice(0, 8)];
}
function chooseOne(list) { if (!list.length) return null; const top = list.slice(0, Math.min(10, list.length)); return top[Math.floor(Math.random() * top.length)]; }
function drawCandidates(list, pickedId) {
  const box = document.getElementById('candidateList');
  box.innerHTML = '';
  if (!list.length) { box.innerHTML = '<div class="subline">' + esc(tr('noMatch')) + '</div>'; return; }
  list.forEach(c => {
    const row = document.createElement('div');
    row.className = 'row';
    row.innerHTML = `
      <div><b>${c.golfCourseId === pickedId ? '★ ' : ''}${esc(c.name)}</b></div>
      <div class="subline">${esc(tr('brand'))}: ${esc(displayBrand(c.brand))} / ${esc(tr('comfort'))} ${c.comfort} / ${esc(tr('rating'))} ${Number(c.evaluation || 0).toFixed(1)}</div>
      <div class="subline">${esc(c.address)}</div>
      <div class="subline"><a href="${c.detailUrl}" target="_blank" rel="noopener noreferrer">${esc(tr('detail'))}</a> / <a href="${c.reserveUrl}" target="_blank" rel="noopener noreferrer">${esc(tr('reserve'))}</a></div>
    `;
    box.appendChild(row);
  });
}
function drawWinner(pref, picked, list) {
  document.getElementById('winPref').textContent = pref ? displayPref(pref) : '-';
  if (!picked) {
    document.getElementById('winCourse').textContent = tr('noCandidates');
    document.getElementById('winDesc').textContent = tr('checkFilters');
    document.getElementById('winMeta').innerHTML = '';
    document.getElementById('winLinks').innerHTML = '';
    drawCandidates([]);
    return;
  }
  document.getElementById('winCourse').textContent = picked.name;
  document.getElementById('winDesc').textContent = picked.address || '';
  document.getElementById('winMeta').innerHTML = `
    <span class="pill">${esc(displayBrand(picked.brand))}</span>
    <span class="pill">${esc(tr('comfort'))} ${picked.comfort}</span>
    <span class="pill">${esc(tr('rating'))} ${Number(picked.evaluation || 0).toFixed(1)}</span>
  `;
  document.getElementById('winLinks').innerHTML = `
    <a class="primaryLink" href="${picked.detailUrl}" target="_blank" rel="noopener noreferrer">${esc(tr('golfDetail'))}</a>
    <a href="${picked.reserveUrl}" target="_blank" rel="noopener noreferrer">${esc(tr('reserve'))}</a>
  `;
  drawCandidates(list, picked.golfCourseId);
}

function updateStaticTexts() {
  document.documentElement.lang = T[currentLang].htmlLang;
  document.getElementById('gateEyebrow').textContent = tr('gateEyebrow');
  document.getElementById('gateTitle').textContent = tr('gateTitle');
  document.getElementById('gateSub').textContent = tr('gateSub');
  document.getElementById('gateNote').textContent = tr('gateNote');
  document.getElementById('chooseJa').textContent = '日本語で始める';
  document.getElementById('chooseEn').textContent = 'Start in English';
  document.getElementById('appTitle').textContent = 'Golf Journey Roulette';
  document.getElementById('appSub').textContent = tr('appSub');
  document.getElementById('seasonTtl').textContent = tr('seasonTtl');
  document.getElementById('areaTtl').textContent = tr('areaTtl');
  document.getElementById('brandTtl').textContent = tr('brandTtl');
  document.getElementById('spinBtn').textContent = tr('spin');
  document.getElementById('rerollBtn').textContent = tr('reroll');
  document.getElementById('candidateTitle').textContent = tr('candidateTitle');
  document.getElementById('langJa').classList.toggle('active', currentLang === 'ja');
  document.getElementById('langEn').classList.toggle('active', currentLang === 'en');
  if (!document.getElementById('winCourse').textContent) {
    document.getElementById('winCourse').textContent = tr('noResultYet');
    document.getElementById('winDesc').textContent = tr('pleaseSpin');
  }
}

function refreshLabels() {
  document.getElementById('seasonLabel').textContent = tr('seasonPill') + ': ' + seasonLabel(seasonKey());
  document.getElementById('areaLabel').textContent = tr('areaPill') + ': ' + document.getElementById('area').selectedOptions[0].textContent;
  if (!document.getElementById('statusLabel').textContent) document.getElementById('statusLabel').textContent = tr('statusPill');
}

function setLanguage(lang, openApp = true) {
  currentLang = lang;
  localStorage.setItem('golfJourneyLang', lang);
  updateStaticTexts();
  populateSeasonOptions();
  populateAreaOptions();
  renderBrandChips();
  refreshLabels();
  setStatus('warn', tr('envNotice'));
  const boot = makeTickerItems(AREAS.all, '東京都');
  renderTicker(boot);
  const idx0 = boot.lastIndexOf('東京都');
  ticker.style.transform = `translateY(${(BOX_H / 2) - (ITEM_H / 2) - (idx0 * ITEM_H)}px)`;
  if (openApp) {
    document.getElementById('languageGate').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
  }
  if (lastPref) {
    document.getElementById('statusLabel').textContent = tr('decided') + ': ' + displayPref(lastPref);
  }
}

async function spin() {
  try {
    refreshLabels();
    document.getElementById('statusLabel').textContent = tr('spinning');
    setStatus('warn', tr('spinningStatus'));

    const prefs = currentAreaPrefs();
    if (!prefs.length) throw new Error(tr('noArea'));
    const winner = pickWeightedPref(prefs);
    const items = makeTickerItems(prefs, winner);
    renderTicker(items);
    const idx = items.lastIndexOf(winner);
    const targetY = (BOX_H / 2) - (ITEM_H / 2) - (idx * ITEM_H);

    await new Promise(resolve => {
      const start = performance.now(), dur = 2200;
      const ease = t => 1 - Math.pow(1 - t, 3);
      function frame(now) {
        const p = Math.min(1, (now - start) / dur);
        ticker.style.transform = `translateY(${targetY * ease(p)}px)`;
        if (p < 1) requestAnimationFrame(frame); else resolve();
      }
      requestAnimationFrame(frame);
    });

    document.getElementById('statusLabel').textContent = tr('prefDecided') + ': ' + displayPref(winner);
    setStatus('warn', tr('loadingCourses'));

    let list = [];
    try { list = await fetchCourses(winner); } catch (e) {}
    let finalPref = winner;
    if (!list.length) {
      const fallback = await fetchFirstValidPref(prefs.filter(p => p !== winner));
      finalPref = fallback.pref; list = fallback.list;
    }
    if (!finalPref || !list.length) throw new Error(tr('notFound'));

    lastPref = finalPref;
    document.getElementById('statusLabel').textContent = tr('decided') + ': ' + displayPref(finalPref);
    drawWinner(finalPref, chooseOne(list), list);
    setStatus('ok', tr('okFetched'));
  } catch (e) {
    document.getElementById('statusLabel').textContent = tr('error');
    setStatus('err', esc(e.message || tr('error')));
  }
}

async function reroll() {
  if (!lastPref) return;
  try {
    const list = await fetchCourses(lastPref);
    drawWinner(lastPref, chooseOne(list), list);
    document.getElementById('statusLabel').textContent = tr('rerolled') + ': ' + displayPref(lastPref);
  } catch (e) {
    setStatus('err', esc(e.message || tr('error')));
  }
}

document.getElementById('chooseJa').onclick = () => setLanguage('ja', true);
document.getElementById('chooseEn').onclick = () => setLanguage('en', true);
document.getElementById('langJa').onclick = () => setLanguage('ja', true);
document.getElementById('langEn').onclick = () => setLanguage('en', true);
document.getElementById('spinBtn').onclick = spin;
document.getElementById('rerollBtn').onclick = reroll;
document.getElementById('season').onchange = () => { refreshLabels(); cache.clear(); };
document.getElementById('area').onchange = () => { refreshLabels(); lastPref = null; };

const savedLang = localStorage.getItem('golfJourneyLang');
updateStaticTexts();
populateSeasonOptions();
populateAreaOptions();
renderBrandChips();
document.getElementById('winCourse').textContent = tr('noResultYet');
document.getElementById('winDesc').textContent = tr('pleaseSpin');
setStatus('warn', tr('envNotice'));
refreshLabels();
const boot = makeTickerItems(AREAS.all, '東京都');
renderTicker(boot);
const idx0 = boot.lastIndexOf('東京都');
ticker.style.transform = `translateY(${(BOX_H / 2) - (ITEM_H / 2) - (idx0 * ITEM_H)}px)`;

if (savedLang === 'ja' || savedLang === 'en') {
  setLanguage(savedLang, true);
}
</script>
