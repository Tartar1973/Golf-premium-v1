<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Golf Journey Roulette Secure Fixed</title>
<style>
:root{--bg:#0b1220;--panel:rgba(17,24,39,.92);--line:rgba(255,255,255,.12);--text:#eef2ff;--muted:#a5b4cc;--gold:#d4af37;--gold2:#f6e27a}
*{box-sizing:border-box}body{margin:0;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;background:linear-gradient(180deg,#08101d 0%,#0b1220 48%,#111827 100%);min-height:100vh}
.wrap{max-width:1100px;margin:0 auto;padding:18px}.grid{display:grid;grid-template-columns:320px 1fr;gap:18px}
.panel,.card{background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:18px}
h1{margin:0 0 8px;font-size:34px;background:linear-gradient(90deg,#fff,var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:var(--muted);margin-bottom:18px;line-height:1.6}.ttl{display:block;color:var(--gold2);font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin:0 0 8px}
select,button{font:inherit}select{width:100%;padding:12px 14px;border-radius:14px;background:#111827;color:var(--text);border:1px solid var(--line)}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 16px}.chip{padding:9px 12px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid var(--line);cursor:pointer}.chip.active{background:rgba(212,175,55,.16);border-color:rgba(212,175,55,.45)}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{border:none;border-radius:16px;padding:14px 16px;font-weight:900;cursor:pointer}.primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#241700}.secondary{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--line)}
.roulette{position:relative;overflow:hidden;height:220px;border-radius:22px;border:1px solid var(--line);background:rgba(255,255,255,.03)}.ticker{position:absolute;left:0;right:0;top:0;will-change:transform}
.item{height:72px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:30px;border-bottom:1px solid rgba(255,255,255,.04)}.item:nth-child(odd){background:rgba(255,255,255,.02)}.pointer{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:72px;border-top:2px solid rgba(212,175,55,.86);border-bottom:2px solid rgba(212,175,55,.86)}
.meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.pill{padding:8px 12px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.06);font-size:13px}
.result{display:grid;grid-template-columns:1.1fr .9fr;gap:18px}.pref{font-size:40px;font-weight:900}.course{font-size:26px;font-weight:900}.desc,.subline{color:var(--muted);line-height:1.5}.list{max-height:480px;overflow:auto}.row{padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06)}.row:last-child{border-bottom:none}
.links a{display:inline-block;margin:8px 8px 0 0;padding:10px 12px;border-radius:12px;text-decoration:none;color:var(--text);border:1px solid var(--line);background:rgba(255,255,255,.08)}
.notice{margin-top:14px;padding:12px;border-radius:14px;background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.25)}
@media(max-width:900px){.grid,.result{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
<h1>Golf Journey Roulette</h1>
<div class="sub">400対策版。フロントは <b>prefCode</b> を送信し、<code>/api/search</code> 単体アクセスは 200 を返します。</div>
<div class="grid">
  <div class="panel">
    <label class="ttl">Season</label>
    <select id="season"><option value="auto">自動判定</option><option value="spring">春</option><option value="summer">夏</option><option value="autumn">秋</option><option value="winter">冬</option></select>
    <label class="ttl" style="margin-top:16px">Area</label>
    <select id="area"><option value="all">全国</option><option value="hokkaido">北海道</option><option value="tohoku">東北</option><option value="kanto">関東</option><option value="chubu">中部</option><option value="kinki">近畿</option><option value="chugoku">中国</option><option value="shikoku">四国</option><option value="kyushu">九州</option><option value="okinawa">沖縄</option></select>
    <label class="ttl" style="margin-top:16px">Brand</label>
    <div id="brandChips" class="chips"></div>
    <div class="actions"><button id="spinBtn" class="btn primary">ルーレット開始</button><button id="rerollBtn" class="btn secondary">同じ県で再抽選</button></div>
    <div id="statusBox" class="notice">サーバー側で楽天GORA APIを呼びます。Vercel環境変数を設定してください。</div>
  </div>
  <div>
    <div class="card">
      <div class="roulette"><div class="pointer"></div><div id="ticker" class="ticker"></div></div>
      <div class="meta"><span id="seasonLabel" class="pill">季節: -</span><span id="areaLabel" class="pill">エリア: 全国</span><span id="statusLabel" class="pill">待機中</span></div>
    </div>
    <div class="result" style="margin-top:18px">
      <div class="card"><div class="pref" id="winPref">-</div><div class="course" id="winCourse">まだ結果がありません</div><div class="desc" id="winDesc">ルーレットを回してください。</div><div class="meta" id="winMeta"></div><div class="links" id="winLinks"></div></div>
      <div class="card"><h3 style="margin-top:0">候補一覧</h3><div id="candidateList" class="list"></div></div>
    </div>
  </div>
</div>
</div>
<script>
const PREF_CODES={'北海道':1,'青森県':2,'岩手県':3,'宮城県':4,'秋田県':5,'山形県':6,'福島県':7,'茨城県':8,'栃木県':9,'群馬県':10,'埼玉県':11,'千葉県':12,'東京都':13,'神奈川県':14,'新潟県':15,'富山県':16,'石川県':17,'福井県':18,'山梨県':19,'長野県':20,'岐阜県':21,'静岡県':22,'愛知県':23,'三重県':24,'滋賀県':25,'京都府':26,'大阪府':27,'兵庫県':28,'奈良県':29,'和歌山県':30,'鳥取県':31,'島根県':32,'岡山県':33,'広島県':34,'山口県':35,'徳島県':36,'香川県':37,'愛媛県':38,'高知県':39,'福岡県':40,'佐賀県':41,'長崎県':42,'熊本県':43,'大分県':44,'宮崎県':45,'鹿児島県':46,'沖縄県':47};
const AREAS={all:Object.keys(PREF_CODES),hokkaido:['北海道'],tohoku:['青森県','岩手県','宮城県','秋田県','山形県','福島県'],kanto:['茨城県','栃木県','群馬県','埼玉県','千葉県','東京都','神奈川県'],chubu:['新潟県','富山県','石川県','福井県','山梨県','長野県','岐阜県','静岡県','愛知県','三重県'],kinki:['滋賀県','京都府','大阪府','兵庫県','奈良県','和歌山県'],chugoku:['鳥取県','島根県','岡山県','広島県','山口県'],shikoku:['徳島県','香川県','愛媛県','高知県'],kyushu:['福岡県','佐賀県','長崎県','熊本県','大分県','宮崎県','鹿児島県'],okinawa:['沖縄県']};
const BRANDS=['GRAND PGM','PGM','アコーディア','その他'];
const REGION_BASE={summer:['北海道','青森県','岩手県','宮城県','秋田県','山形県','福島県','新潟県','長野県'],winter:['静岡県','三重県','和歌山県','高知県','福岡県','佐賀県','長崎県','熊本県','大分県','宮崎県','鹿児島県','沖縄県']};
const brandChips=document.getElementById('brandChips'); let activeBrands=new Set(BRANDS), lastPref=null, cache=new Map();
function brandOf(name){const s=(name||'').toLowerCase(); if(s.includes('pgm')||s.includes('パシフィック')) return s.includes('総武')||s.includes('マリア')||s.includes('武蔵')||s.includes('石岡')||s.includes('利府')||s.includes('桂') ? 'GRAND PGM' : 'PGM'; if(s.includes('アコーディア')||s.includes('accordia')||s.includes('習志野')||s.includes('東千葉')||s.includes('東京相武')) return 'アコーディア'; return 'その他';}
function season(){const v=document.getElementById('season').value;if(v!=='auto') return v;const m=new Date().getMonth()+1; if([3,4,5].includes(m)) return 'spring'; if([6,7,8].includes(m)) return 'summer'; if([9,10,11].includes(m)) return 'autumn'; return 'winter';}
function seasonLabel(k){return {spring:'春',summer:'夏',autumn:'秋',winter:'冬'}[k]}
function comfort(pref,brand,evaluation){let score=70+(brand==='GRAND PGM'?8:brand==='PGM'?5:brand==='アコーディア'?3:0)+Math.max(0,((evaluation||3.8)-3.8)*12); const s=season(); if(s==='summer' && REGION_BASE.summer.includes(pref)) score+=10; if(s==='winter' && REGION_BASE.winter.includes(pref)) score+=10; return Math.max(50,Math.min(99,Math.round(score)));}
function renderBrandChips(){brandChips.innerHTML='';BRANDS.forEach((b,i)=>{const d=document.createElement('div');d.className='chip active';d.textContent=b;d.onclick=()=>{if(activeBrands.has(b)) activeBrands.delete(b); else activeBrands.add(b); if(activeBrands.size===0) activeBrands.add(b); [...brandChips.children].forEach((el,j)=>el.classList.toggle('active',activeBrands.has(BRANDS[j])))};brandChips.appendChild(d);});}
renderBrandChips();
function esc(s){return String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}
async function fetchCourses(pref){const code=PREF_CODES[pref]; const key=pref+'::'+code+'::'+[...activeBrands].sort().join(','); if(cache.has(key)) return cache.get(key); const res=await fetch('/api/search?prefCode='+encodeURIComponent(code)+'&pref='+encodeURIComponent(pref)); if(!res.ok) throw new Error(await res.text()||'API error'); const data=await res.json(); let list=(data.items||[]).map(item=>({pref,golfCourseId:item.golfCourseId,name:item.golfCourseName,evaluation:Number(item.evaluation||0),detailUrl:item.golfCourseDetailUrl||'',reserveUrl:item.reserveCalUrl||item.golfCourseDetailUrl||'',address:item.address||'',brand:brandOf(item.golfCourseName)})); list=list.filter(c=>activeBrands.has(c.brand)); list=list.filter(c=>c.brand!=='その他'||c.evaluation>=3.8); list=list.map(c=>({...c,comfort:comfort(pref,c.brand,c.evaluation)})).sort((a,b)=>b.comfort-a.comfort||b.evaluation-a.evaluation); cache.set(key,list); return list;}
async function eligiblePrefs(){const prefs=AREAS[document.getElementById('area').value]; const out=[]; for(const pref of prefs){try{const list=await fetchCourses(pref); if(list.length) out.push(pref);}catch(e){}} return out;}
const ticker=document.getElementById('ticker'); const ITEM_H=72, BOX_H=220;
function renderTicker(items){ticker.innerHTML=''; items.forEach(name=>{const d=document.createElement('div'); d.className='item'; d.textContent=name; ticker.appendChild(d);})}
function makeTickerItems(prefs,winner){const rep=[]; for(let i=0;i<6;i++) rep.push(...prefs); rep.push(winner); return [...rep,...prefs.slice(0,8)]}
function chooseOne(list){if(!list.length) return null; const top=list.slice(0,Math.min(10,list.length)); return top[Math.floor(Math.random()*top.length)]}
function drawCandidates(list,pickedId){const box=document.getElementById('candidateList'); box.innerHTML=''; if(!list.length){box.innerHTML='<div class="subline">条件に合う候補がありません。</div>'; return;} list.forEach(c=>{const row=document.createElement('div'); row.className='row'; row.innerHTML=`<div class="name">${c.golfCourseId===pickedId?'★ ':''}${esc(c.name)}</div><div class="subline">${esc(c.brand)} / 快適度 ${c.comfort} / 評価 ${Number(c.evaluation||0).toFixed(1)}</div><div class="subline">${esc(c.address||'')}</div><div class="subline"><a href="${c.detailUrl}" target="_blank" rel="noopener noreferrer">詳細</a> / <a href="${c.reserveUrl}" target="_blank" rel="noopener noreferrer">予約カレンダー</a></div>`; box.appendChild(row);})}
function drawWinner(pref,picked,list){document.getElementById('winPref').textContent=pref||'-'; if(!picked){document.getElementById('winCourse').textContent='候補がありません'; document.getElementById('winDesc').textContent='環境変数やブランド選択を確認してください。'; document.getElementById('winMeta').innerHTML=''; document.getElementById('winLinks').innerHTML=''; drawCandidates([]); return;} document.getElementById('winCourse').textContent=picked.name; document.getElementById('winDesc').textContent=picked.address||''; document.getElementById('winMeta').innerHTML=`<span class="pill">${picked.brand}</span><span class="pill">快適度 ${picked.comfort}</span><span class="pill">評価 ${Number(picked.evaluation||0).toFixed(1)}</span>`; document.getElementById('winLinks').innerHTML=`<a href="${picked.detailUrl}" target="_blank" rel="noopener noreferrer">ゴルフ場詳細</a><a href="${picked.reserveUrl}" target="_blank" rel="noopener noreferrer">予約カレンダー</a>`; drawCandidates(list,picked.golfCourseId);}
function setStatus(cls,html){const box=document.getElementById('statusBox'); box.className=cls; box.innerHTML=html}
async function spin(){try{document.getElementById('seasonLabel').textContent='季節: '+seasonLabel(season()); document.getElementById('areaLabel').textContent='エリア: '+document.getElementById('area').selectedOptions[0].textContent; document.getElementById('statusLabel').textContent='候補を取得中'; setStatus('notice','サーバー側から楽天GORA APIに問い合わせています。少し待ってください。'); const prefs=await eligiblePrefs(); if(!prefs.length) throw new Error('候補が見つかりませんでした。'); const winner=prefs[Math.floor(Math.random()*prefs.length)]; const items=makeTickerItems(prefs,winner); renderTicker(items); const idx=items.lastIndexOf(winner); const targetY=(BOX_H/2)-(ITEM_H/2)-(idx*ITEM_H); await new Promise(resolve=>{const start=performance.now(),dur=2500; const ease=t=>1-Math.pow(1-t,3); function frame(now){const p=Math.min(1,(now-start)/dur); ticker.style.transform=`translateY(${targetY*ease(p)}px)`; if(p<1) requestAnimationFrame(frame); else resolve();} requestAnimationFrame(frame);}); document.getElementById('statusLabel').textContent='決定: '+winner; lastPref=winner; const list=await fetchCourses(winner); drawWinner(winner, chooseOne(list), list); setStatus('ok','候補名・評価・詳細URL・予約URLはサーバー側経由で取得しています。'); }catch(e){document.getElementById('statusLabel').textContent='エラー'; setStatus('error',esc(e.message||'エラー'))}}
async function reroll(){if(!lastPref) return; try{const list=await fetchCourses(lastPref); drawWinner(lastPref, chooseOne(list), list); document.getElementById('statusLabel').textContent='再抽選: '+lastPref;}catch(e){setStatus('error',esc(e.message||'エラー'))}}
document.getElementById('spinBtn').onclick=spin; document.getElementById('rerollBtn').onclick=reroll;
document.getElementById('seasonLabel').textContent='季節: '+seasonLabel(season()); document.getElementById('areaLabel').textContent='エリア: '+document.getElementById('area').selectedOptions[0].textContent;
const boot=makeTickerItems(AREAS.all,'東京都'); renderTicker(boot); const idx0=boot.lastIndexOf('東京都'); ticker.style.transform=`translateY(${(BOX_H/2)-(ITEM_H/2)-(idx0*ITEM_H)}px)`;
</script>
</body></html>
