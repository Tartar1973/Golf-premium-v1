function setStatus(type,html){statusBox.className=type;statusBox.innerHTML=html;}
function escapeHtml(s){return String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');}
async function fetchCoursesForPref(pref){const key=pref+'::'+[...activeBrands].sort().join(',')+'::'+currentSeason();if(cache.has(key)) return cache.get(key);const res=await fetch('/api/search?pref='+encodeURIComponent(pref));if(!res.ok){const txt=await res.text();throw new Error(txt||'API error');}const data=await res.json();let list=(data.items||[]).map(item=>({pref,golfCourseId:item.golfCourseId,name:item.golfCourseName,evaluation:Number(item.evaluation||0),detailUrl:item.golfCourseDetailUrl||'',reserveUrl:item.reserveCalUrl||item.golfCourseDetailUrl||'',address:item.address||'',caption:item.golfCourseCaption||'',imageUrl:item.golfCourseImageUrl||'',brand:inferBrand(item.golfCourseName)}));list=list.filter(c=>activeBrands.has(c.brand)||(c.brand==='その他'&&activeBrands.has('その他')));list=list.filter(c=>c.brand!=='その他'||c.evaluation>=3.8);list=list.map(c=>({...c,comfort:comfort(pref,c.brand,c.evaluation)})).sort((a,b)=>b.comfort-a.comfort||b.evaluation-a.evaluation);cache.set(key,list);return list;}
async function eligiblePrefs(){const prefs=AREA_PREFS[document.getElementById('area').value];const result=[];for(const pref of prefs){try{const list=await fetchCoursesForPref(pref);if(list.length) result.push(pref);}catch(e){}}return result;}
const ticker=document.getElementById('ticker');const ITEM_H=72,BOX_H=240;
function renderTicker(items){ticker.innerHTML='';items.forEach(name=>{const div=document.createElement('div');div.className='item';div.textContent=name;ticker.appendChild(div);});}
function makeTickerItems(prefs,winner){const rep=[];for(let i=0;i<6;i++) rep.push(...prefs);rep.push(winner);return [...rep,...prefs.slice(0,8)];}
function chooseOne(list){if(!list.length) return null;const top=list.slice(0,Math.min(10,list.length));return top[Math.floor(Math.random()*top.length)];}
function renderCandidates(list,pickedId){const box=document.getElementById('candidateList');box.innerHTML='';if(!list.length){box.innerHTML='<div class="subline">条件に合う候補がありません。</div>';return;}list.forEach(c=>{const row=document.createElement('div');row.className='row';row.innerHTML=`<div class="name">${c.golfCourseId===pickedId?'★ ':''}${escapeHtml(c.name)}</div><div class="subline">${escapeHtml(c.brand)} / 快適度 ${c.comfort} / 評価 ${Number(c.evaluation||0).toFixed(1)}</div><div class="subline">${escapeHtml(c.address||'')}</div><div class="subline"><a href="${c.detailUrl}" target="_blank" rel="noopener noreferrer" style="color:#93c5fd">詳細</a> &nbsp;/&nbsp; <a href="${c.reserveUrl}" target="_blank" rel="noopener noreferrer" style="color:#93c5fd">予約カレンダー</a></div>`;box.appendChild(row);});}
function renderWinner(pref,picked,list){document.getElementById('winPref').textContent=pref||'-';if(!picked){document.getElementById('winCourse').textContent='候補がありません';document.getElementById('winDesc').textContent='ブランドやサーバー設定を確認してください。';document.getElementById('winMeta').innerHTML='';document.getElementById('winLinks').innerHTML='';renderCandidates([]);return;}document.getElementById('winCourse').textContent=picked.name;document.getElementById('winDesc').textContent=picked.address||picked.caption||`${pref} の候補です。`;document.getElementById('winMeta').innerHTML=`<span class="pill">${picked.brand}</span><span class="pill">快適度 ${picked.comfort}</span><span class="pill">評価 ${Number(picked.evaluation||0).toFixed(1)}</span>`;document.getElementById('winLinks').innerHTML=`<a class="pri" href="${picked.detailUrl}" target="_blank" rel="noopener noreferrer">ゴルフ場詳細</a><a href="${picked.reserveUrl}" target="_blank" rel="noopener noreferrer">予約カレンダー</a>`;renderCandidates(list,picked.golfCourseId);}
async function spin(){try{document.getElementById('seasonLabel').textContent=`季節: ${seasonLabelText(currentSeason())}`;document.getElementById('areaLabel').textContent=`エリア: ${AREA_LABELS[document.getElementById('area').value]}`;document.getElementById('statusLabel').textContent='候補を取得中';setStatus('warn','<div>サーバー側から楽天GORA APIに問い合わせています。少し待ってください。</div>');const prefs=await eligiblePrefs();if(!prefs.length) throw new Error('候補が見つかりませんでした。環境変数かブランド選択を確認してください。');const winner=prefs[Math.floor(Math.random()*prefs.length)];const items=makeTickerItems(prefs,winner);renderTicker(items);const idx=items.lastIndexOf(winner);const targetY=(BOX_H/2)-(ITEM_H/2)-(idx*ITEM_H);await new Promise(resolve=>{const start=performance.now(),dur=3200;const easeOutCubic=t=>1-Math.pow(1-t,3);function frame(now){const p=Math.min(1,(now-start)/dur);const y=targetY*easeOutCubic(p);ticker.style.transform=`translateY(${y}px)`;if(p<1) requestAnimationFrame(frame);else resolve();}requestAnimationFrame(frame);});document.getElementById('statusLabel').textContent=`決定: ${winner}`;lastPref=winner;const list=await fetchCoursesForPref(winner);const picked=chooseOne(list);renderWinner(winner,picked,list);setStatus('ok','<div>候補名・評価・詳細URL・予約URLはサーバー側経由で取得しています。</div>');}catch(e){document.getElementById('statusLabel').textContent='エラー';setStatus('error',`<div>${escapeHtml(e.message||'エラーが発生しました。')}</div>`);}}
async function reroll(){if(!lastPref) return;try{document.getElementById('statusLabel').textContent=`再抽選: ${lastPref}`;const list=await fetchCoursesForPref(lastPref);const picked=chooseOne(list);renderWinner(lastPref,picked,list);}catch(e){setStatus('error',`<div>${escapeHtml(e.message||'エラーが発生しました。')}</div>`);}}
document.getElementById('spinBtn').onclick=spin;document.getElementById('rerollBtn').onclick=reroll;document.getElementById('season').onchange=()=>{document.getElementById('seasonLabel').textContent=`季節: ${seasonLabelText(currentSeason())}`;cache.clear();};document.getElementById('area').onchange=()=>{document.getElementById('areaLabel').textContent=`エリア: ${AREA_LABELS[document.getElementById('area').value]}`;lastPref=null;};document.getElementById('seasonLabel').textContent=`季節: ${seasonLabelText(currentSeason())}`;document.getElementById('areaLabel').textContent=`エリア: ${AREA_LABELS[document.getElementById('area').value]}`;const bootItems=makeTickerItems(AREA_PREFS.all,'東京都');renderTicker(bootItems);const idx0=bootItems.lastIndexOf('東京都');ticker.style.transform=`translateY(${(BOX_H/2)-(ITEM_H/2)-(idx0*ITEM_H)}px)`;
</script>
</body>
