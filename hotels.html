<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ホテル検索 - Golf Journey Roulette</title>
<style>
:root{--bg:#0b1220;--panel:rgba(17,24,39,.92);--line:rgba(255,255,255,.12);--text:#eef2ff;--muted:#a5b4cc;--gold:#d4af37;--gold2:#f6e27a;--green:#34d399;--green2:#065f46}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;background:radial-gradient(circle at top,rgba(52,211,153,.08),transparent 30%),linear-gradient(180deg,#08101d 0%,#0b1220 48%,#111827 100%);min-height:100vh}
.wrap{max-width:480px;margin:0 auto;padding:20px 16px}
.wrapWide{max-width:960px;margin:0 auto;padding:20px 16px}
.back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:14px;cursor:pointer;background:none;border:none;padding:0;margin-bottom:16px}
.back:hover{color:var(--text)}
.badge{display:inline-block;background:rgba(52,211,153,.15);border:1px solid rgba(52,211,153,.35);color:var(--green);border-radius:999px;padding:4px 12px;font-size:12px;font-weight:700;margin-bottom:10px}
h1{margin:0 0 6px;font-size:clamp(20px,5vw,28px);font-weight:900;background:linear-gradient(90deg,#fff,var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:var(--muted);font-size:13px;margin-bottom:24px}

/* ドラムロール */
.drumSection{background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:20px;margin-bottom:16px;backdrop-filter:blur(10px)}
.drumLabel{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.drumRow{display:flex;gap:8px;justify-content:center;align-items:center}
.drumWrap{position:relative;flex:1}
.drumWrap.sm{flex:0 0 68px}
.drum{height:180px;overflow:hidden;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid var(--line);position:relative;touch-action:none}
.drumViewport{height:180px;overflow:hidden;position:relative}
.drumInner{position:absolute;width:100%;will-change:transform}
.drumItem{height:60px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:rgba(255,255,255,.3);transition:color .08s,font-size .08s}
.drumItem.sel{color:var(--text);font-size:26px}
.drumHL{position:absolute;top:50%;left:0;right:0;transform:translateY(-50%);height:60px;border-top:2px solid rgba(212,175,55,.7);border-bottom:2px solid rgba(212,175,55,.7);background:linear-gradient(90deg,transparent,rgba(212,175,55,.06),transparent);pointer-events:none}
.drumFT{position:absolute;top:0;left:0;right:0;height:55px;background:linear-gradient(to bottom,rgba(11,18,32,.97),transparent);pointer-events:none}
.drumFB{position:absolute;bottom:0;left:0;right:0;height:55px;background:linear-gradient(to top,rgba(11,18,32,.97),transparent);pointer-events:none}
.sep{font-size:20px;font-weight:900;color:var(--muted);flex:0 0 auto}
.weekday{text-align:center;font-size:17px;font-weight:900;color:var(--gold2);margin-top:12px;min-height:26px}

/* ステッパー */
.optRow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.optBox{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:14px;backdrop-filter:blur(10px)}
.optLabel{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.stepper{display:flex;align-items:center;justify-content:space-between;gap:8px}
.stepBtn{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:rgba(255,255,255,.08);color:var(--text);font-size:22px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none}
.stepBtn:active{background:rgba(255,255,255,.2)}
.stepVal{font-size:24px;font-weight:900;min-width:36px;text-align:center}

/* オプション */
.optionsBox{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:14px;backdrop-filter:blur(10px);margin-bottom:16px}
.optionsTitle{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.checkRow{display:flex;flex-direction:column;gap:10px}
.checkItem{display:flex;align-items:center;gap:10px;cursor:pointer;font-size:15px}
.checkItem input{width:20px;height:20px;accent-color:var(--green);cursor:pointer;flex-shrink:0}

.searchBtn{width:100%;padding:16px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--green2),var(--green));color:#fff;font:inherit;font-size:18px;font-weight:900;cursor:pointer;margin-bottom:8px}
.searchBtn:active{opacity:.85}

/* 結果画面 */
.status{padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);line-height:1.6;margin-bottom:16px;font-size:14px}
.warn{background:rgba(96,165,250,.08);border-color:rgba(96,165,250,.25)}
.err{background:rgba(248,113,113,.10);border-color:rgba(248,113,113,.28)}
.ok{background:rgba(52,211,153,.08);border-color:rgba(52,211,153,.28)}
.sortRow{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.sortLabel{color:var(--muted);font-size:13px}
.fBtn{padding:7px 14px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--text);cursor:pointer;font:inherit;font-size:13px}
.fBtn.active{background:rgba(52,211,153,.15);border-color:rgba(52,211,153,.4);color:var(--green)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:16px;backdrop-filter:blur(10px);display:flex;flex-direction:column;gap:8px}
.card img{width:100%;height:150px;object-fit:cover;border-radius:12px;background:#1a2435}
.hName{font-weight:800;font-size:15px;line-height:1.4}
.hAddr{color:var(--muted);font-size:12px;line-height:1.5}
.stars{color:var(--gold);font-size:13px}
.price{font-weight:900;font-size:20px;color:var(--green)}
.priceNote{color:var(--muted);font-size:11px;font-weight:400}
.pills{display:flex;flex-wrap:wrap;gap:5px}
.pill{padding:3px 9px;border:1px solid var(--line);border-radius:999px;font-size:11px;color:var(--muted)}
.ratingGrid{display:grid;grid-template-columns:1fr 1fr;gap:3px;font-size:11px;color:var(--muted)}
.rItem{display:flex;justify-content:space-between}
.rVal{color:var(--gold)}
.reserveBtn{display:block;text-align:center;padding:11px;border-radius:12px;background:linear-gradient(135deg,var(--green2),var(--green));color:#fff;text-decoration:none;font-weight:800;font-size:14px;margin-top:auto}
.reserveBtn:hover{opacity:.9}
.checkinInfo{font-size:12px;color:var(--muted);text-align:center}
.hidden{display:none}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- 日付選択画面 -->
<div id="pageDate" class="wrap">
  <button class="back" onclick="window.close()">← 閉じる</button>
  <div class="badge" id="courseBadge">⛳</div>
  <h1>宿泊日を選ぶ</h1>
  <div class="sub" id="courseSub"></div>

  <div class="drumSection">
    <div class="drumLabel">チェックイン日</div>
    <div class="drumRow">
      <div class="drumWrap">
        <div class="drum" id="drumY">
          <div class="drumViewport">
            <div class="drumInner" id="innerY"></div>
          </div>
          <div class="drumHL"></div><div class="drumFT"></div><div class="drumFB"></div>
        </div>
      </div>
      <div class="sep">年</div>
      <div class="drumWrap sm">
        <div class="drum" id="drumM">
          <div class="drumViewport">
            <div class="drumInner" id="innerM"></div>
          </div>
          <div class="drumHL"></div><div class="drumFT"></div><div class="drumFB"></div>
        </div>
      </div>
      <div class="sep">月</div>
      <div class="drumWrap sm">
        <div class="drum" id="drumD">
          <div class="drumViewport">
            <div class="drumInner" id="innerD"></div>
          </div>
          <div class="drumHL"></div><div class="drumFT"></div><div class="drumFB"></div>
        </div>
      </div>
      <div class="sep">日</div>
    </div>
    <div class="weekday" id="weekday"></div>
  </div>

  <div class="optRow">
    <div class="optBox">
      <div class="optLabel">泊数</div>
      <div class="stepper">
        <button class="stepBtn" onclick="changeNights(-1)">−</button>
        <div class="stepVal" id="nightsVal">1</div>
        <button class="stepBtn" onclick="changeNights(1)">＋</button>
      </div>
    </div>
    <div class="optBox">
      <div class="optLabel">大人人数</div>
      <div class="stepper">
        <button class="stepBtn" onclick="changeAdults(-1)">−</button>
        <div class="stepVal" id="adultsVal">1</div>
        <button class="stepBtn" onclick="changeAdults(1)">＋</button>
      </div>
    </div>
  </div>

  <div class="optionsBox">
    <div class="optionsTitle">絞り込み</div>
    <div class="checkRow">
      <label class="checkItem"><input type="checkbox" id="onsen"><span>♨️ 温泉あり</span></label>
      <label class="checkItem"><input type="checkbox" id="daiyoku"><span>🛁 大浴場あり</span></label>
      <label class="checkItem"><input type="checkbox" id="internet"><span>📶 インターネット可</span></label>
    </div>
  </div>

  <button class="searchBtn" onclick="doSearch()">🔍 ホテルを検索する</button>
</div>

<!-- 結果画面 -->
<div id="pageResult" class="wrapWide hidden">
  <button class="back" onclick="showDatePage()">← 日付を変更</button>
  <div class="badge" id="resultBadge">⛳</div>
  <h1>空室ホテル一覧</h1>
  <div id="statusBox" class="status warn">🔍 検索中...</div>
  <div class="sortRow" id="sortRow" style="display:none">
    <span class="sortLabel">並び替え:</span>
    <button class="fBtn active" onclick="setSort('price',event)">料金順</button>
    <button class="fBtn" onclick="setSort('rating',event)">評価順</button>
  </div>
  <div id="hotelGrid" class="grid"></div>
</div>

<script>
const params     = new URLSearchParams(location.search);
const courseName = params.get('name')    || 'ゴルフ場';
const address    = params.get('address') || '';
const pref       = params.get('pref')    || '';

document.getElementById('courseBadge').textContent = '⛳ ' + courseName;
document.getElementById('courseSub').textContent   = `「${courseName}」周辺のホテルを楽天トラベルで検索します`;
document.getElementById('resultBadge').textContent = '⛳ ' + courseName;

// ======= ドラムロール =======
const IH = 60; // item height px
const PAD = 2; // padding items top/bottom
const WD  = ['日','月','火','水','木','金','土'];
const WC  = ['#f87171','#eef2ff','#eef2ff','#eef2ff','#eef2ff','#eef2ff','#60a5fa'];
const daysInMonth = (y,m) => new Date(y,m,0).getDate();

const now = new Date();
let selY = now.getFullYear(), selM = now.getMonth()+1, selD = now.getDate();
let nights = 1, adults = 1;

function pad2(n){ return String(n).padStart(2,'0'); }
function toDateStr(y,m,d){ return `${y}-${pad2(m)}-${pad2(d)}`; }

function updateWeekday(){
  const d = new Date(selY, selM-1, selD);
  const w = d.getDay();
  document.getElementById('weekday').textContent = `（${WD[w]}曜日）`;
  document.getElementById('weekday').style.color = WC[w];
}

// --- Drum class ---
class Drum {
  constructor(drumId, innerId, getItems, fmt, onChange){
    this.drum    = document.getElementById(drumId);
    this.inner   = document.getElementById(innerId);
    this.getItems= getItems;
    this.fmt     = fmt || (v=>String(v));
    this.onChange= onChange;
    this.idx     = 0;
    this.y       = 0;       // current translateY (pixels, negative = scroll down)
    this.velY    = 0;
    this.lastY   = 0;
    this.lastT   = 0;
    this.dragging= false;
    this.rafId   = null;
    this._bind();
  }

  build(selectedIdx){
    const items = this.getItems();
    this.inner.innerHTML = '';
    // top padding
    for(let i=0;i<PAD;i++) this._addItem('');
    items.forEach((v,i)=>{
      const el = document.createElement('div');
      el.className = 'drumItem' + (i===selectedIdx?' sel':'');
      el.textContent = this.fmt(v);
      this.inner.appendChild(el);
    });
    // bottom padding
    for(let i=0;i<PAD;i++) this._addItem('');
    this.setIdx(selectedIdx, false);
  }

  _addItem(text){
    const el = document.createElement('div');
    el.className = 'drumItem';
    el.textContent = text;
    this.inner.appendChild(el);
  }

  setIdx(idx, animate=true){
    const items = this.getItems();
    this.idx = Math.max(0, Math.min(items.length-1, idx));
    this.y   = -(this.idx * IH);
    this.inner.style.transition = animate ? 'transform .15s cubic-bezier(.25,.46,.45,.94)' : 'none';
    this.inner.style.transform  = `translateY(${60 + this.y}px)`; // 60 = 1 item offset for center
    this._updateClasses();
    this.onChange(items[this.idx]);
  }

  _updateClasses(){
    const allItems = this.inner.querySelectorAll('.drumItem');
    allItems.forEach((el,i) => {
      el.classList.toggle('sel', i-PAD === this.idx);
    });
  }

  _clamp(idx){
    return Math.max(0, Math.min(this.getItems().length-1, idx));
  }

  _applyY(rawY, animate=false){
    const items = this.getItems();
    const minY  = -((items.length-1)*IH);
    const maxY  = 0;
    // rubber band outside
    let y = rawY;
    if(y > maxY) y = maxY + (y-maxY)*0.3;
    if(y < minY) y = minY + (y-minY)*0.3;
    this.y = y;
    this.inner.style.transition = animate ? 'transform .2s ease' : 'none';
    this.inner.style.transform  = `translateY(${60 + this.y}px)`;
    // update selected
    const nearIdx = this._clamp(Math.round(-this.y / IH));
    if(nearIdx !== this.idx){
      this.idx = nearIdx;
      this._updateClasses();
      this.onChange(this.getItems()[this.idx]);
    }
  }

  _snap(){
    const items  = this.getItems();
    const target = this._clamp(Math.round(-this.y / IH));
    this.idx = target;
    this.y   = -(target * IH);
    this.inner.style.transition = 'transform .2s cubic-bezier(.25,.46,.45,.94)';
    this.inner.style.transform  = `translateY(${60 + this.y}px)`;
    this._updateClasses();
    this.onChange(items[this.idx]);
  }

  _inertia(){
    if(Math.abs(this.velY) < 0.5){ this._snap(); return; }
    this.velY *= 0.92;
    this._applyY(this.y + this.velY);
    this.rafId = requestAnimationFrame(()=>this._inertia());
  }

  _bind(){
    const onStart = (clientY) => {
      if(this.rafId){ cancelAnimationFrame(this.rafId); this.rafId=null; }
      this.dragging = true;
      this.lastY    = clientY;
      this.lastT    = performance.now();
      this.velY     = 0;
      this.inner.style.transition = 'none';
    };
    const onMove = (clientY) => {
      if(!this.dragging) return;
      const now  = performance.now();
      const dt   = Math.max(1, now - this.lastT);
      const dy   = clientY - this.lastY;
      this.velY  = dy / dt * 16; // px per frame @60fps
      this._applyY(this.y + dy);
      this.lastY = clientY;
      this.lastT = now;
    };
    const onEnd = () => {
      if(!this.dragging) return;
      this.dragging = false;
      this._inertia();
    };

    // touch
    this.drum.addEventListener('touchstart', e=>{
      onStart(e.touches[0].clientY);
    }, {passive:true});
    this.drum.addEventListener('touchmove', e=>{
      onMove(e.touches[0].clientY);
      e.preventDefault();
    }, {passive:false});
    this.drum.addEventListener('touchend',  ()=>onEnd());
    this.drum.addEventListener('touchcancel',()=>onEnd());

    // mouse
    this.drum.addEventListener('mousedown', e=>{
      onStart(e.clientY); e.preventDefault();
    });
    window.addEventListener('mousemove', e=>{
      if(this.dragging) onMove(e.clientY);
    });
    window.addEventListener('mouseup', ()=>{ if(this.dragging) onEnd(); });
  }
}

// 年ドラム
const years = [now.getFullYear(), now.getFullYear()+1];
const drumY = new Drum('drumY','innerY',
  ()=>years, v=>String(v),
  val=>{ selY=val; rebuildDays(); }
);
drumY.build(years.indexOf(selY));

// 月ドラム
const months = Array.from({length:12},(_,i)=>i+1);
const drumM = new Drum('drumM','innerM',
  ()=>months, v=>pad2(v),
  val=>{ selM=val; rebuildDays(); }
);
drumM.build(selM-1);

// 日ドラム
let drumD;
function buildDrumD(){
  const days = Array.from({length:daysInMonth(selY,selM)},(_,i)=>i+1);
  if(!drumD){
    drumD = new Drum('drumD','innerD',
      ()=>Array.from({length:daysInMonth(selY,selM)},(_,i)=>i+1),
      v=>pad2(v),
      val=>{ selD=val; updateWeekday(); }
    );
  }
  const maxD = daysInMonth(selY,selM);
  if(selD > maxD) selD = maxD;
  drumD.build(selD-1);
}

function rebuildDays(){
  buildDrumD();
  updateWeekday();
}

buildDrumD();
updateWeekday();

// ステッパー
function changeNights(d){ nights=Math.max(1,Math.min(14,nights+d)); document.getElementById('nightsVal').textContent=nights; }
function changeAdults(d){ adults=Math.max(1,Math.min(10,adults+d)); document.getElementById('adultsVal').textContent=adults; }

// 画面切り替え
function showDatePage(){ document.getElementById('pageDate').classList.remove('hidden'); document.getElementById('pageResult').classList.add('hidden'); }
function showResultPage(){ document.getElementById('pageDate').classList.add('hidden'); document.getElementById('pageResult').classList.remove('hidden'); }

// ソート
let allHotels=[], currentSort='price', checkinStr='', checkoutStr='';
function setSort(key,e){
  currentSort=key;
  document.querySelectorAll('.sortRow .fBtn').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  renderHotels();
}

function starStr(n){
  const v=Math.round((n||0)*2)/2;
  return '★'.repeat(Math.floor(v))+(v%1?'☆':'')+('☆'.repeat(Math.max(0,5-Math.ceil(v))));
}

function renderHotels(){
  const sorted=[...allHotels].sort((a,b)=>
    currentSort==='rating'?(b.reviewAverage||0)-(a.reviewAverage||0)
    :(a.minCharge||99999999)-(b.minCharge||99999999)
  );
  const grid=document.getElementById('hotelGrid');
  grid.innerHTML='';
  sorted.forEach(h=>{
    const card=document.createElement('div');
    card.className='card';
    const price  = h.minCharge?`¥${Number(h.minCharge).toLocaleString()}〜`:'要確認';
    const review = h.reviewAverage?`${Number(h.reviewAverage).toFixed(1)} (${h.reviewCount||0}件)`:'-';
    const rRows  = [['サービス',h.serviceAverage],['立地',h.locationAverage],['部屋',h.roomAverage],['風呂',h.bathAverage],['食事',h.mealAverage]]
      .filter(([,v])=>v).map(([k,v])=>`<div class="rItem"><span>${k}</span><span class="rVal">${Number(v).toFixed(1)}</span></div>`).join('');
    const baseUrl=h.planListUrl||h.hotelInformationUrl||'#';
    const rUrl=baseUrl!=='#'?`${baseUrl}&checkinDate=${checkinStr}&checkoutDate=${checkoutStr}&adultNum=${adults}&roomNum=1`:'#';
    card.innerHTML=`
      ${h.hotelImageUrl?`<img src="${h.hotelImageUrl}" alt="${h.hotelName}" loading="lazy" onerror="this.style.display='none'">`:'' }
      <div class="hName">${h.hotelName}</div>
      <div class="hAddr">${h.address1||''}${h.address2||''}</div>
      <div class="stars">${starStr(h.reviewAverage)} <span style="color:var(--muted);font-size:11px">${review}</span></div>
      <div class="pills">${h.checkinTime?`<span class="pill">IN ${h.checkinTime}</span>`:''}${h.checkoutTime?`<span class="pill">OUT ${h.checkoutTime}</span>`:''}</div>
      ${rRows?`<div class="ratingGrid">${rRows}</div>`:''}
      <div class="price">${price} <span class="priceNote">/ 1室 ${nights}泊</span></div>
      <div class="checkinInfo">${checkinStr} 〜 ${checkoutStr}（${nights}泊）</div>
      <a class="reserveBtn" href="${rUrl}" target="_blank" rel="noopener noreferrer">楽天トラベルで予約</a>`;
    grid.appendChild(card);
  });
}

async function doSearch(){
  const co=new Date(selY,selM-1,selD); co.setDate(co.getDate()+nights);
  checkinStr =toDateStr(selY,selM,selD);
  checkoutStr=toDateStr(co.getFullYear(),co.getMonth()+1,co.getDate());
  const squeeze=[];
  if(document.getElementById('onsen').checked)    squeeze.push('onsen');
  if(document.getElementById('daiyoku').checked)  squeeze.push('daiyoku');
  if(document.getElementById('internet').checked) squeeze.push('internet');

  showResultPage();
  document.getElementById('statusBox').className='status warn';
  document.getElementById('statusBox').textContent='🔍 空室を検索中...';
  document.getElementById('sortRow').style.display='none';
  document.getElementById('hotelGrid').innerHTML='';

  try{
    let url=`/api/hotels?name=${encodeURIComponent(courseName)}&address=${encodeURIComponent(address)}&pref=${encodeURIComponent(pref)}&checkin=${checkinStr}&checkout=${checkoutStr}&adults=${adults}&rooms=1`;
    if(squeeze.length) url+=`&squeeze=${squeeze.join(',')}`;
    const res=await fetch(url);
    if(!res.ok) throw new Error(await res.text()||'API error');
    const data=await res.json();
    allHotels=data.hotels||[];
    if(!allHotels.length){
      document.getElementById('statusBox').className='status warn';
      document.getElementById('statusBox').innerHTML=`⚠️「${data.keyword||address}」周辺に空室が見つかりませんでした。<br>日付や人数を変えてお試しください。`;
      return;
    }
    document.getElementById('statusBox').className='status ok';
    document.getElementById('statusBox').textContent=`✅ ${allHotels.length}件の空室（${data.keyword} / ${checkinStr}〜${checkoutStr} ${nights}泊）`;
    document.getElementById('sortRow').style.display='flex';
    renderHotels();
  }catch(e){
    document.getElementById('statusBox').className='status err';
    document.getElementById('statusBox').textContent='❌ エラー: '+(e.message||'取得失敗');
  }
}
</script>
</body>
</html>
